name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build-release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          version="${GITHUB_REF_NAME:-manual}"

          build_target() {
            local goos="$1"
            local goarch="$2"
            local archive="$3"

            local binary_name="deploypier"
            if [[ "$goos" == "windows" ]]; then
              binary_name="deploypier.exe"
            fi

            local package_name="deploypier_${version}_${goos}_${goarch}"
            local workdir="dist/${package_name}"

            rm -rf "$workdir"
            mkdir -p "$workdir"

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w -X github.com/deploypier/deploypier/internal/version.String=${version}" -o "${workdir}/${binary_name}" .

            if [[ "$archive" == "zip" ]]; then
              (
                cd dist
                zip -rq "${package_name}.zip" "${package_name}"
              )
            else
              tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"
            fi

            rm -rf "$workdir"
          }

          build_target windows amd64 zip
          build_target windows arm64 zip
          build_target linux amd64 tar.gz
          build_target linux arm64 tar.gz
          build_target darwin amd64 tar.gz
          build_target darwin arm64 tar.gz

          (
            cd dist
            sha256sum deploypier_* > checksums.txt
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploypier-release-assets
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt
